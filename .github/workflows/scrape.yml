name: Execute Game Price Scrapers

on:
  schedule:
    - cron: '0 */6 * * *'  # Automatically runs every 6 hours
  workflow_dispatch:       # Gives you the manual "Run workflow" button

jobs:
  scrape_and_store:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Scraper Engine Script
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: env PYTHONPATH=. python run_scrapers.py